# =================================================================
#  fridge_simulator.yaml  -  ESPHome Host/SDL Simulator
#
#  Preview the Freshness Tracker (fridge expiry) page on
#  macOS/Linux without real hardware.
#
#  Requirements:
#    brew install sdl2
#    pip install esphome
#
#  Run:
#    esphome run fridge_simulator.yaml
#
#  Controls (SDL window):
#    Mouse click  → touch input
#    Close window → exit
#
#  Design source: FigmaDesign/冰箱食物设计/
# =================================================================

esphome:
  name: fridge-simulator
  on_boot:
    priority: -100
    then:
      - lvgl.page.show: page_fridge

host:

# ── SDL Display (240×240) ──────────────────────────────────────
display:
  - platform: sdl
    id: round_display
    dimensions:
      width: 240
      height: 240

# ── SDL Touchscreen (mouse input) ─────────────────────────────
touchscreen:
  - platform: sdl
    display: round_display
    id: touch

# ── Globals required by the included page ─────────────────────
globals:
  - id: in_menu
    type: bool
    initial_value: 'false'

# ── Shared base color (page background) ───────────────────────
color:
  - id: col_bg
    hex: "FFFFFF"
  - id: col_text_sec
    hex: "94A3B8"

# ── Default font (required by LVGL component init) ────────────
font:
  - file: "gfonts://DM+Sans"
    id: font_lbl
    size: 11
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .-_%/"

# ── LVGL base ─────────────────────────────────────────────────
lvgl:
  displays:
    - round_display
  touchscreens:
    - touch
  color_depth: 16
  bg_color: col_bg
  default_font: font_lbl
  pages:
    # Stub clock page — navigation target for close_fridge
    - id: page_clock
      bg_color: col_bg
      bg_opa: COVER
      widgets:
        - label:
            align: CENTER
            text: "[ Clock ]"
            text_color: col_text_sec

# ── Include the Freshness Tracker page ────────────────────────
packages:
  fridge_page: !include
    file: src/pages/fridge.yaml
    vars:
      fridge_outer_bg: "FFFFFF"
