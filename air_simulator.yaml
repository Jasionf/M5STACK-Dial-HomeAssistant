# =================================================================
#  air_simulator.yaml - ESPHome Host/SDL simulator for Air page
#
#  Purpose:
#    Preview src/pages/air.yaml quickly on macOS/Linux without hardware.
#
#  Requirements:
#    brew install sdl2
#    source esphome-env/bin/activate
#
#  Run:
#    esphome run air_simulator.yaml
# =================================================================

esphome:
  name: air-simulator
  on_boot:
    priority: -100
    then:
      - lvgl.page.show: page_air
      - script.execute: refresh_air

host:

# Home Assistant-backed sensors in src/pages/air.yaml require API component.
api:

display:
  - platform: sdl
    id: round_display
    dimensions:
      width: 240
      height: 240

touchscreen:
  - platform: sdl
    display: round_display
    id: touch

# Global expected by open_air script in src/pages/air.yaml
globals:
  - id: in_menu
    type: bool
    initial_value: 'false'

# Base colors and default font required by LVGL init
color:
  - id: col_bg
    hex: "000000"
  - id: col_text_sec
    hex: "94A3B8"

font:
  - file: "gfonts://DM+Sans"
    id: font_lbl
    size: 11
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .-_%/"

lvgl:
  displays:
    - round_display
  touchscreens:
    - touch
  color_depth: 16
  bg_color: col_bg
  default_font: font_lbl
  pages:
    # Stub page required by close_air navigation target
    - id: page_clock
      bg_color: col_bg
      bg_opa: COVER
      widgets:
        - label:
            align: CENTER
            text: "[ Clock ]"
            text_color: col_text_sec

packages:
  air_page: !include src/pages/air.yaml
