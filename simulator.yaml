# =================================================================
#  simulator.yaml  -  ESPHome Host/SDL Simulator
#
#  Preview the Light page UI on macOS/Linux without real hardware.
#
#  Requirements:
#    brew install sdl2
#    pip install esphome
#
#  Run:
#    esphome run simulator.yaml
#
#  Controls (SDL window):
#    Mouse click  → touch input
#    Close window → exit
# =================================================================

esphome:
  name: air-simulator
  on_boot:
    priority: -100
    then:
      - script.execute: open_air

host:

# ── SDL Display (240×240) ──────────────────────────────────────
display:
  - platform: sdl
    id: round_display
    dimensions:
      width: 240
      height: 240

# ── SDL Touchscreen (mouse input) ─────────────────────────────
touchscreen:
  - platform: sdl
    display: round_display
    id: touch

# ── Shared globals referenced across pages ────────────────────
globals:
  - id: ha_connected
    type: bool
    initial_value: 'false'
  - id: in_menu
    type: bool
    initial_value: 'false'
  - id: in_light
    type: bool
    initial_value: 'false'
  - id: in_music
    type: bool
    initial_value: 'false'

# ── Shared colors (from dial.yaml) ────────────────────────────
color:
  - id: col_bg
    hex: "060610"
  - id: col_text_pri
    hex: "E2E8F0"
  - id: col_text_sec
    hex: "94A3B8"

# ── Default font (used by LVGL base) ──────────────────────────
font:
  - file: "gfonts://DM+Sans"
    id: font_lbl
    size: 11
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .-_%/"

# ── LVGL base: bind display + stub clock page ─────────────────
lvgl:
  displays:
    - round_display
  touchscreens:
    - touch
  color_depth: 16
  bg_color: col_bg
  default_font: font_lbl
  pages:
    # Stub clock page — needed because close_light navigates here
    - id: page_clock
      bg_color: col_bg
      bg_opa: COVER
      widgets:
        - label:
            align: CENTER
            text: "[ Clock Page ]"
            text_color: col_text_sec

# ── Include Air page ─────────────────────────────────────────
packages:
  air_page: !include src/pages/air.yaml
