    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz "

  # # Column headers: START / END
  # - file: "gfonts://DM+Sans"
  #   id: font_fridge_col
  #   size: 11
  #   bpp: 4
  #   glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZ "

  # Date values and pill text
  - file:
      family: DM+Sans
      weight: 800
      type: gfonts
    id: font_fridge_col
    size: 11
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 /->"


