image:
  - file: "src/assets/images/牛奶.png"
    id: img_fridge_milk
    type: RGB565
    transparency: alpha_channel
    resize: 20x20
  - file: "src/assets/images/鸡蛋.png"
    id: img_fridge_eggs
    type: RGB565
    transparency: alpha_channel
    resize: 20x20
  - file: "src/assets/images/面包.png"
    id: img_fridge_bread
    type: RGB565
    transparency: alpha_channel
    resize: 20x20
  - file: "src/assets/images/警告.png"
    id: img_fridge_warn_icon
    type: RGB565
    transparency: alpha_channel
    resize: 20x20
  - file: "src/assets/images/安全1.png"
    id: img_fridge_safe_icon
    type: RGB565
    transparency: alpha_channel
    resize: 20x20
  - file: "src/assets/images/危险.png"
    id: img_fridge_exp_icon
    type: RGB565
    transparency: alpha_channel
    resize: 20x20

globals:
  - id: in_fridge
    type: bool
    initial_value: 'false'
  - id: fridge_card
    type: int
    initial_value: '0'
  - id: fridge_animating
    type: bool
    initial_value: 'false'

script:
  - id: open_fridge
    then:
      - globals.set: {id: in_fridge, value: 'true'}
      - globals.set: {id: in_menu, value: 'false'}
      - globals.set: {id: fridge_card, value: '0'}
      - lambda: 'lv_obj_scroll_to_y(id(fridge_scroll), 0, LV_ANIM_OFF);'
      - lvgl.page.show:
          id: page_fridge
          animation: MOVE_LEFT

  - id: close_fridge
    then:
      - globals.set: {id: in_fridge, value: 'false'}
      - lvgl.page.show:
          id: page_clock
          animation: MOVE_RIGHT

  - id: fridge_scroll_down
    then:
      - if:
          condition:
            lambda: 'return !id(fridge_animating);'
          then:
            - globals.set: {id: fridge_animating, value: 'true'}
            - lambda: |-
                int next = (id(fridge_card) + 1) % 3;
                bool wrap = (id(fridge_card) == 2);
                if (wrap) {
                  // 把 Milk 移到 Bread 下方，让动画能连续滑入
                  lv_obj_set_y(id(card_milk), 720);
                  lv_obj_scroll_to_y(id(fridge_scroll), 720, LV_ANIM_ON);
                } else {
                  lv_obj_scroll_to_y(id(fridge_scroll), next * 240, LV_ANIM_ON);
                }
                id(fridge_card) = next;
                static lv_anim_t fa;
                lv_anim_init(&fa);
                lv_anim_set_var(&fa, nullptr);
                lv_anim_set_values(&fa, 0, 1);
                lv_anim_set_time(&fa, 320);
                lv_anim_set_exec_cb(&fa, [](void*, int32_t){});
                lv_anim_set_ready_cb(&fa, [](lv_anim_t*){
                  if (id(fridge_card) == 0) {
                    lv_obj_set_y(id(card_milk), 0);
                    lv_obj_scroll_to_y(id(fridge_scroll), 0, LV_ANIM_OFF);
                  }
                  id(fridge_animating) = false;
                });
                lv_anim_start(&fa);

  - id: fridge_scroll_up
    then:
      - if:
          condition:
            lambda: 'return !id(fridge_animating);'
          then:
            - globals.set: {id: fridge_animating, value: 'true'}
            - lambda: |-
                int prev = ((id(fridge_card) - 1) + 3) % 3;
                bool wrap = (id(fridge_card) == 0);
                if (wrap) {
                  // 把 Bread 移到 Milk 上方，重新排列后跳到 Milk 所在的偏移量再滑上去
                  lv_obj_set_y(id(card_bread), 0);
                  lv_obj_set_y(id(card_milk), 240);
                  lv_obj_set_y(id(card_eggs), 480);
                  lv_obj_scroll_to_y(id(fridge_scroll), 240, LV_ANIM_OFF);
                  lv_obj_scroll_to_y(id(fridge_scroll), 0, LV_ANIM_ON);
                } else {
                  lv_obj_scroll_to_y(id(fridge_scroll), prev * 240, LV_ANIM_ON);
                }
                id(fridge_card) = prev;
                static lv_anim_t fa;
                lv_anim_init(&fa);
                lv_anim_set_var(&fa, nullptr);
                lv_anim_set_values(&fa, 0, 1);
                lv_anim_set_time(&fa, 320);
                lv_anim_set_exec_cb(&fa, [](void*, int32_t){});
                lv_anim_set_ready_cb(&fa, [](lv_anim_t*){
                  if (id(fridge_card) == 2) {
                    lv_obj_set_y(id(card_milk), 0);
                    lv_obj_set_y(id(card_eggs), 240);
                    lv_obj_set_y(id(card_bread), 480);
                    lv_obj_scroll_to_y(id(fridge_scroll), 480, LV_ANIM_OFF);
                  }
                  id(fridge_animating) = false;
                });
                lv_anim_start(&fa);

# ── LVGL page ──────────────────────────────────────────────────
# Layout maths (240×240 round screen):
#   Card: x=16, y=44, w=208, h=152, radius=16
#   Left panel: w=100, h=152
#   Arc: x=5, y=12, w=90, h=90  (centre of panel: 50,56)
#   Icon: x=36, y=43 (centred in arc: 5+(90-28)/2=36, 12+(90-28)/2=43)
#   Badge: x=22, y=130
#   Right content starts at x=112
#   Hairline: y=54  START:y=61  END:y=78  Pill:y=119,h=22
#   Page dots y=220, centred at x=120
lvgl:
  pages:
    - id: page_fridge
      bg_color: col_fridge_outer
      bg_opa: COVER
      scrollbar_mode: "OFF"
      widgets:

        # ── Outer round clip (240×240) ─────────────────────────
        - obj:
            x: 0
            y: 0
            width: 240
            height: 240
            radius: 120
            clip_corner: true
            bg_color: col_fridge_bg
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            scrollbar_mode: "OFF"
            widgets:

              # ── Vertical scroll container — 3 × 240px pages ──
              - obj:
                  id: fridge_scroll
                  x: 0
                  y: 0
                  width: 240
                  height: 240
                  bg_color: col_fridge_bg
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  widgets:

                    # ==========================================
                    #  ITEM 1 — Milk  SOON  75%  2 days left
                    # ==========================================
                    - obj:
                        id: card_milk
                        x: 0
                        y: 0
                        width: 240
                        height: 240
                        bg_color: col_fridge_bg
                        bg_opa: COVER
                        border_width: 0
                        pad_all: 0
                        clickable: false
                        scrollbar_mode: "OFF"
                        widgets:

                          # Background glow
                          - obj:
                              x: 0
                              y: 0
                              width: 240
                              height: 240
                              radius: 120
                              bg_color: col_fridge_bg
                              bg_opa: COVER
                              border_width: 0
                              pad_all: 0
                              clickable: false

                          # Card  x=20 y=59 w=200 h=132  (3:7 left:right = 62:138)
                          - obj:
                              x: 20
                              y: 59
                              width: 200
                              height: 132
                              bg_color: col_fridge_card
                              bg_opa: COVER
                              border_color: col_board_warn
                              border_width: 2
                              radius: 16
                              clip_corner: true
                              pad_all: 0
                              clickable: false
                              scrollbar_mode: "OFF"
                              shadow_color: col_fridge_warn
                              shadow_width: 12
                              shadow_spread: 2
                              shadow_opa: 30%
                              widgets:

                                # Left panel w=62
                                - obj:
                                    x: 0
                                    y: 0
                                    width: 62
                                    height: 132
                                    bg_color: col_fridge_warn_med
                                    bg_opa: COVER
                                    border_width: 0
                                    radius: 0
                                    pad_all: 0
                                    clickable: false

                                # Closed ring — 75% filled
                                # arc centre within card: (7+24=31, 28+24=52)
                                - arc:
                                    id: arc_milk
                                    x: 7
                                    y: 28
                                    width: 48
                                    height: 48
                                    rotation: 270
                                    start_angle: 0
                                    end_angle: 359
                                    min_value: 0
                                    max_value: 100
                                    value: 75
                                    arc_color: col_fridge_track
                                    arc_width: 4
                                    arc_opa: COVER
                                    arc_rounded: false
                                    adjustable: false
                                    clickable: false
                                    indicator:
                                      arc_color: col_fridge_warn
                                      arc_width: 4
                                      arc_opa: COVER
                                      arc_rounded: false
                                    knob:
                                      bg_opa: TRANSP
                                      border_width: 0
                                      width: 0
                                      height: 0

                                # Icon square bg centred in arc (31-16=15, 52-16=36)
                                - obj:
                                    x: 15
                                    y: 36
                                    width: 32
                                    height: 32
                                    radius: 6
                                    bg_color: col_fridge_warn_med
                                    bg_opa: COVER
                                    border_width: 0
                                    pad_all: 0
                                    clickable: false

                                # Status icon (31-10=21, 52-10=42)
                                - image:
                                    x: 21
                                    y: 42
                                    src: img_fridge_warn_icon

                                # Status badge
                                - label:
                                    x: 17
                                    y: 82
                                    text: "SOON"
                                    text_color: col_fridge_warn
                                    text_font: font_fridge_badge

                                # Divider line
                                - obj:
                                    x: 62
                                    y: 8
                                    width: 1
                                    height: 116
                                    bg_color: col_fridge_warn
                                    bg_opa: 10%
                                    border_width: 0
                                    clickable: false

                                # Food icon + name
                                - image:
                                    x: 78
                                    y: 9
                                    src: img_fridge_milk
                                - label:
