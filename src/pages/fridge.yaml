    hex: "${fridge_outer_bg}"
  - id: col_fridge_bg
    hex: "0a0a0a"
  # SOON — orange
  - id: col_fridge_warn
    hex: "fb923c"
  - id: col_fridge_warn_dim
    hex: "2d1506"
  - id: col_fridge_warn_med
    hex: "4a2308"
  # SAFE — green
  - id: col_fridge_safe
    hex: "6EDA88"
  - id: col_fridge_safe_dim
    hex: "0d2618"
  - id: col_fridge_safe_med
    hex: "1a4a2c"
  # EXPIRED — red
  - id: col_fridge_exp
    hex: "f87171"
  - id: col_fridge_exp_dim
    hex: "2d0d0d"
  - id: col_fridge_exp_med
    hex: "4a1515"
  # Neutrals
  - id: col_fridge_text
    hex: "323230"
  - id: col_fridge_theme
    hex: "FFFFFF"
  - id: col_fridge_time
    hex: "7B7B7A"
  - id: col_fridge_sec
    hex: "494948"
  - id: col_fridge_track
    hex: "1E1E1E"
  - id: col_fridge_card
    hex: "161614"
  - id: col_fridge_divider
    hex: "ffffff"
  # Card body bg (outer frame tint)
  - id: col_fridge_warn_bg
    hex: "2C231C"
  - id: col_fridge_safe_bg
    hex: "242A24"
  - id: col_fridge_exp_bg
    hex: "382A1D"
  # Icon square backgrounds
  - id: col_fridge_warn_icon
    hex: "4a2308"
  - id: col_fridge_safe_icon
    hex: "4a1515"

  - id: col_board_warn 
    hex: "1E1610"
  - id: col_board_safe
    hex: "111A12" 
  - id: col_board_expired
