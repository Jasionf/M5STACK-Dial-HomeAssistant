# =================================================================
#  src/pages/fridge.yaml  -  Freshness Tracker (Fridge Expiry)
#
#  One full-screen card per food item.  Swipe up/down to browse.
#  Each card fills the 240×240 display and shows:
#    · Coloured background glow matching status
#    · Left panel: large circular progress arc + shield icon area
#      + status badge (SAFE / SOON / EXPIRED)
#    · Right panel: item name, START/END dates, days-left pill
#
#  Status thresholds (days left):
#    > 2 days  → SAFE    (green  #4ade80)
#    1–2 days  → SOON    (orange #fb923c)
#    0 days    → EXPIRED (red    #f87171)
#
#  Demo data (today = 2026-04-04):
#    Milk  04/01–04/05 →  75% consumed, 2 days left → SOON
#    Eggs  03/28–04/10 →  54% consumed, 7 days left → SAFE
#    Bread 04/02–04/04 → 100% consumed, expired     → EXPIRED
#
#  Screen: 240×240 round display
#  Layout: vertical snap-scroll, each child 240×240
# =================================================================


substitutions:
  fridge_outer_bg: "0a0a0a"

# ── Status colours ────────────────────────────────────────────
color:
