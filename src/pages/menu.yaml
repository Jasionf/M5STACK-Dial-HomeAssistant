# =================================================================
#  src/pages/menu.yaml  -  Infinite Loop Vertical Menu
#
#  5 fixed visual slot widgets; menu_sel (0..4 mod 5) determines
#  which item data maps to centre. Infinite loop via modulo wrap.
#
#  Slot layout (top to bottom):
#    slot_far_up   y=18   opa=64  icon+title only
#    slot_near_up  y=60   opa=128 icon+title only
#    slot_center   y=102  opa=255 pill bg, icon+title+subtitle
#    slot_near_dn  y=144  opa=128 icon+title only
#    slot_far_dn   y=186  opa=64  icon+title only
#
#  Items: 0=Scene 1=Cinema 2=Lights 3=AC 4=Music
# =================================================================

# -- Fonts --------------------------------------------------------
font:
  - file: "gfonts://DM+Sans"
    id: font_menu_item
    size: 20
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .-_%/"

  - file: "gfonts://DM+Sans"
    id: font_menu_center
    size: 21
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .-_%/"

  - file: "gfonts://DM+Sans"
    id: font_menu_sub
    size: 12
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .-_%/"

# -- Colors -------------------------------------------------------
color:
  - id: col_menu_bg
    hex: "000000"
  - id: col_menu_pill
    hex: "0D1537"
  - id: col_menu_accent
    hex: "576BFE"
  - id: col_menu_val
    hex: "4D5BD3"
  - id: col_menu_dim
    hex: "232A38"
  - id: col_menu_sdot_dim
    hex: "2A3348"

image:
  - file: src/assets/images/灯泡.png
    id: menu_img_light
    type: RGB565
    transparency: alpha_channel
    resize: 34x34
  - file: src/assets/images/空调logo.png
    id: menu_img_ac
    type: RGB565
    transparency: alpha_channel
    resize: 32x32
  - file: src/assets/images/音乐.png
    id: menu_img_music
    type: RGB565
    transparency: alpha_channel
    resize: 34x34
  - file: src/assets/images/冰箱.png
    id: menu_img_fridge
    type: RGB565
    transparency: alpha_channel
    resize: 34x34
  - file: src/assets/images/计时.png
    id: menu_img_timer
    type: RGB565
    transparency: alpha_channel
    resize: 32x32
  - file: src/assets/images/家.png
    id: menu_img_home
    type: RGB565
    transparency: alpha_channel
    resize: 34x34
# -- Globals ------------------------------------------------------
globals:
  - id: menu_sel
    type: int
    initial_value: '0'
  - id: in_menu
    type: bool
    initial_value: 'false'
  - id: menu_animating
    type: bool
    initial_value: 'false'
  - id: button_debounce
    type: bool
    initial_value: 'false'

# -- Scripts ------------------------------------------------------
script:
  - id: open_menu
    then:
      - globals.set: {id: menu_sel, value: '5'}
      - globals.set: {id: in_menu, value: 'true'}
      - script.execute: refresh_menu
      - lvgl.page.show:
          id: page_menu
          animation: MOVE_LEFT

  - id: close_menu
    then:
      - globals.set: {id: in_menu, value: 'false'}
      - lvgl.page.show:
          id: page_clock
          animation: MOVE_RIGHT

  - id: menu_scroll_up
    then:
      - if:
          condition:
            lambda: 'return !id(menu_animating);'
          then:
            - globals.set: {id: menu_animating, value: 'true'}
            - lambda: |-
                // Counterclockwise arc scroll: previous item moves into center.
                static lv_anim_t a;
                lv_anim_init(&a);
                lv_anim_set_var(&a, nullptr);
                lv_anim_set_values(&a, 0, 100);
                lv_anim_set_time(&a, 200);
                lv_anim_set_path_cb(&a, lv_anim_path_ease_in_out);
                lv_anim_set_exec_cb(&a, [](void * obj, int32_t progress) {
                  const int SLOT_N = 5;
                  const int ITEM_N = 6;
                  const int OFFSETS[5] = {-2, -1, 0, 1, 2};
                  const float CY = 120.0f;
                  const float ARC_CX = 162.0f;
                  const float R = 98.0f;
                  // Non-uniform spacing: near=60px, far=96px (independent)
                  auto arc_dy = [](float off) -> float {
                    const float s = (off >= 0.0f) ? 1.0f : -1.0f;
                    const float a = fabsf(off);
                    return s * (a <= 1.0f ? a * 60.0f : 60.0f + (a - 1.0f) * 36.0f);
                  };

                  lv_obj_t* slots[5] = {
                    id(slot_far_up), id(slot_near_up), id(slot_center),
                    id(slot_near_dn), id(slot_far_dn)
                  };

                  lv_obj_t* icons[5] = {
                    id(slot_far_up_img),  id(slot_near_up_img),
                    id(slot_center_img),
                    id(slot_near_dn_img), id(slot_far_dn_img)
                  };
                  lv_obj_t* title_lbls[5] = {
                    id(slot_far_up_lbl),  id(slot_near_up_lbl),
                    id(slot_center_lbl),
                    id(slot_near_dn_lbl), id(slot_far_dn_lbl)
                  };

                  const float phase = progress / 100.0f;
                  int center_sub_opa = 0;

                  for (int i = 0; i < SLOT_N; i++) {
                    const float off = OFFSETS[i] + phase;
                    float dy = arc_dy(off);
                    if (dy > R) dy = R;
                    if (dy < -R) dy = -R;

                    const float theta = asinf(dy / R);
                    const float x = ARC_CX - R * cosf(theta);
                    const float y = CY + R * sinf(theta);

                    float closeness = 1.0f - (fabsf(off) / 2.0f);
                    if (closeness < 0.0f) closeness = 0.0f;
                    if (closeness > 1.0f) closeness = 1.0f;

                    const int mix = (int)(closeness * 1000.0f);
                    int w = 40;
                    int opa_text = 0;
                    int opa_bg = 0;
                    int pill_shift = 0;

                    if (mix > 760) {
                      w = lv_map(mix, 760, 1000, 40, 168);
                    }
                    if (mix > 840) {
                      opa_text = lv_map(mix, 840, 1000, 0, 255);
                    }
                    if (mix > 820) {
                      opa_bg = lv_map(mix, 820, 1000, 0, 255);
                    }
                    if (mix > 760) {
                      pill_shift = lv_map(mix, 760, 1000, 0, 54);
                    }
                    const int opa_icon = lv_map(mix, 0, 1000, 96, 255);

                    lv_obj_set_width(slots[i], w);
                    lv_obj_set_height(slots[i], 40);
                    lv_obj_set_style_radius(slots[i], 20, LV_PART_MAIN);
                    lv_obj_set_style_bg_color(slots[i], lv_color_hex(0x0D1537), LV_PART_MAIN);
                    lv_obj_set_style_bg_opa(slots[i], opa_bg, LV_PART_MAIN);

                    lv_obj_set_pos(slots[i], (int)(x - 14.0f - 120.0f + pill_shift), (int)(y - 20.0f));

                    lv_obj_set_style_opa(icons[i], opa_icon, LV_PART_MAIN);
                    lv_obj_set_style_opa(title_lbls[i], opa_text, LV_PART_MAIN);

                    if (i == 2) {
                      center_sub_opa = opa_text;
                    }
                  }

                  lv_obj_set_style_opa(id(slot_center_sub), center_sub_opa, LV_PART_MAIN);

                  // Animate arrow indicator upward
                  const int dot_offsets[6] = {-35, -21, -7, 7, 21, 35};
                  int from_dot = id(menu_sel);
                  int to_dot = ((from_dot - 1) % ITEM_N + ITEM_N) % ITEM_N;
                  int arrow_y = (int)(dot_offsets[from_dot] + (dot_offsets[to_dot] - dot_offsets[from_dot]) * phase);
                  lv_obj_align(id(menu_arrow), LV_ALIGN_RIGHT_MID, -26, arrow_y);
                });
                lv_anim_set_ready_cb(&a, [](lv_anim_t * anim) {
                  int n = 6;
                  id(menu_sel) = ((id(menu_sel) - 1) % n + n) % n;
                  id(refresh_menu).execute();
                  id(menu_animating) = false;
                });
                lv_anim_start(&a);

  - id: menu_scroll_down
    then:
      - if:
          condition:
            lambda: 'return !id(menu_animating);'
          then:
            - globals.set: {id: menu_animating, value: 'true'}
            - lambda: |-
                // Clockwise arc scroll: next item moves into center.
                static lv_anim_t a;
                lv_anim_init(&a);
                lv_anim_set_var(&a, nullptr);
                lv_anim_set_values(&a, 0, 100);
                lv_anim_set_time(&a, 200);
                lv_anim_set_path_cb(&a, lv_anim_path_ease_in_out);
                lv_anim_set_exec_cb(&a, [](void * obj, int32_t progress) {
                  const int SLOT_N = 5;
                  const int ITEM_N = 6;
                  const int OFFSETS[5] = {-2, -1, 0, 1, 2};
                  const float CY = 120.0f;
                  const float ARC_CX = 162.0f;
                  const float R = 98.0f;
                  // Non-uniform spacing: near=60px, far=96px (independent)
                  auto arc_dy = [](float off) -> float {
                    const float s = (off >= 0.0f) ? 1.0f : -1.0f;
                    const float a = fabsf(off);
                    return s * (a <= 1.0f ? a * 60.0f : 60.0f + (a - 1.0f) * 36.0f);
                  };

                  lv_obj_t* slots[5] = {
                    id(slot_far_up), id(slot_near_up), id(slot_center),
                    id(slot_near_dn), id(slot_far_dn)
                  };

                  lv_obj_t* icons[5] = {
                    id(slot_far_up_img),  id(slot_near_up_img),
                    id(slot_center_img),
                    id(slot_near_dn_img), id(slot_far_dn_img)
                  };
                  lv_obj_t* title_lbls[5] = {
                    id(slot_far_up_lbl),  id(slot_near_up_lbl),
                    id(slot_center_lbl),
                    id(slot_near_dn_lbl), id(slot_far_dn_lbl)
                  };

                  const float phase = progress / 100.0f;
                  int center_sub_opa = 0;

                  for (int i = 0; i < SLOT_N; i++) {
                    const float off = OFFSETS[i] - phase;
                    float dy = arc_dy(off);
                    if (dy > R) dy = R;
                    if (dy < -R) dy = -R;

                    const float theta = asinf(dy / R);
                    const float x = ARC_CX - R * cosf(theta);
                    const float y = CY + R * sinf(theta);

                    float closeness = 1.0f - (fabsf(off) / 2.0f);
                    if (closeness < 0.0f) closeness = 0.0f;
                    if (closeness > 1.0f) closeness = 1.0f;

                    const int mix = (int)(closeness * 1000.0f);
                    int w = 40;
                    int opa_text = 0;
                    int opa_bg = 0;
                    int pill_shift = 0;

                    if (mix > 760) {
                      w = lv_map(mix, 760, 1000, 40, 168);
                    }
                    if (mix > 840) {
                      opa_text = lv_map(mix, 840, 1000, 0, 255);
                    }
                    if (mix > 820) {
                      opa_bg = lv_map(mix, 820, 1000, 0, 255);
                    }
                    if (mix > 760) {
                      pill_shift = lv_map(mix, 760, 1000, 0, 64);
                    }
                    const int opa_icon = lv_map(mix, 0, 1000, 96, 255);

                    lv_obj_set_width(slots[i], w);
                    lv_obj_set_height(slots[i], 40);
                    lv_obj_set_style_radius(slots[i], 20, LV_PART_MAIN);
                    lv_obj_set_style_bg_color(slots[i], lv_color_hex(0x0D1537), LV_PART_MAIN);
                    lv_obj_set_style_bg_opa(slots[i], opa_bg, LV_PART_MAIN);

                    lv_obj_set_pos(slots[i], (int)(x - 14.0f - 120.0f + pill_shift), (int)(y - 20.0f));

                    lv_obj_set_style_opa(icons[i], opa_icon, LV_PART_MAIN);
                    lv_obj_set_style_opa(title_lbls[i], opa_text, LV_PART_MAIN);

                    if (i == 2) {
                      center_sub_opa = opa_text;
                    }
                  }

                  lv_obj_set_style_opa(id(slot_center_sub), center_sub_opa, LV_PART_MAIN);

                  // Animate arrow indicator downward
                  const int dot_offsets[6] = {-35, -21, -7, 7, 21, 35};
                  int from_dot = id(menu_sel);
                  int to_dot = (from_dot + 1) % ITEM_N;
                  int arrow_y = (int)(dot_offsets[from_dot] + (dot_offsets[to_dot] - dot_offsets[from_dot]) * phase);
                  lv_obj_align(id(menu_arrow), LV_ALIGN_RIGHT_MID, -26, arrow_y);
                });
                lv_anim_set_ready_cb(&a, [](lv_anim_t * anim) {
                  id(menu_sel) = (id(menu_sel) + 1) % 6;
                  id(refresh_menu).execute();
                  id(menu_animating) = false;
                });
                lv_anim_start(&a);

  - id: menu_confirm
    then:
      - lambda: |-
          ESP_LOGI("menu", "selected item %d", id(menu_sel));
          int sel = id(menu_sel);
          if      (sel == 0) { id(open_timer).execute(); }
          else if (sel == 1) { id(open_fridge).execute(); }
          else if (sel == 2) { id(open_light).execute(); }
          else if (sel == 3) { id(open_air).execute(); }
          else if (sel == 4) { id(open_music).execute(); }
          else if (sel == 5) { id(close_menu).execute(); }
          else               { id(close_menu).execute(); }

  # refresh_menu: stable arc layout using circle equation and angle mapping.
  - id: refresh_menu
    then:
      - lambda: |-
          const int ITEM_N = 6;
          const int SLOT_N = 5;
          const float CY = 120.0f;
          const float ARC_CX = 162.0f;
          const float R = 98.0f;
          // Non-uniform spacing: near=60px, far=96px (independent)
          auto arc_dy = [](float off) -> float {
            const float s = (off >= 0.0f) ? 1.0f : -1.0f;
            const float a = fabsf(off);
            return s * (a <= 1.0f ? a * 60.0f : 60.0f + (a - 1.0f) * 36.0f);
          };

          lv_obj_t* icons[5] = {
            id(slot_far_up_img),  id(slot_near_up_img),
            id(slot_center_img),
            id(slot_near_dn_img), id(slot_far_dn_img)
          };
          lv_obj_t* title_lbls[5] = {
            id(slot_far_up_lbl),  id(slot_near_up_lbl),
            id(slot_center_lbl),
            id(slot_near_dn_lbl), id(slot_far_dn_lbl)
          };
          lv_obj_t* sdots[6] = {
            id(sdot_0), id(sdot_1), id(sdot_2), id(sdot_3), id(sdot_4), id(sdot_5)
          };

          const int OFFSETS[5] = {-2, -1, 0, 1, 2};

          const char* TITLES[6]    = {"Timer", "Fridge", "Lights", "AC", "Music", "Home"};
          const char* SUBTITLES[6] = {"Living Rm - Auto", "Living Rm - Off",
                                      "Living Rm - 75%",  "Living Rm - 24C",
                                      "Living Rm - Off",  "Back to Main"};
          const lv_img_dsc_t* IMGS[6] = {
            id(menu_img_timer)->get_lv_img_dsc(),
            id(menu_img_fridge)->get_lv_img_dsc(),
            id(menu_img_light)->get_lv_img_dsc(),
            id(menu_img_ac)->get_lv_img_dsc(),
            id(menu_img_music)->get_lv_img_dsc(),
            id(menu_img_home)->get_lv_img_dsc()
          };
          int sel = id(menu_sel);

          lv_obj_t* slots[5] = {
            id(slot_far_up), id(slot_near_up), id(slot_center),
            id(slot_near_dn), id(slot_far_dn)
          };

          for (int slot = 0; slot < SLOT_N; slot++) {
            int di = ((sel + OFFSETS[slot]) % ITEM_N + ITEM_N) % ITEM_N;

            const float off = OFFSETS[slot];
            float dy = arc_dy(off);
            if (dy > R) dy = R;
            if (dy < -R) dy = -R;

            const float theta = asinf(dy / R);
            const float x = ARC_CX - R * cosf(theta);
            const float y = CY + R * sinf(theta);

            float closeness = 1.0f - (fabsf(off) / 2.0f);
            if (closeness < 0.0f) closeness = 0.0f;
            if (closeness > 1.0f) closeness = 1.0f;
            const int mix = (int)(closeness * 1000.0f);

            int w = 40;
            int opa_text = 0;
            int opa_bg = 0;
            int pill_shift = 0;
            if (mix > 760) {
              w = lv_map(mix, 760, 1000, 40, 168);
            }
            if (mix > 840) {
              opa_text = lv_map(mix, 840, 1000, 0, 255);
            }
            if (mix > 820) {
              opa_bg = lv_map(mix, 820, 1000, 0, 255);
            }
            if (mix > 760) {
              pill_shift = lv_map(mix, 760, 1000, 0, 54);
            }
            const int opa_icon = lv_map(mix, 0, 1000, 96, 255);

            lv_obj_set_width(slots[slot], w);
            lv_obj_set_height(slots[slot], 40);
            lv_obj_set_style_radius(slots[slot], 20, LV_PART_MAIN);
            lv_obj_set_style_bg_color(slots[slot], lv_color_hex(0x0D1537), LV_PART_MAIN);
            lv_obj_set_style_bg_opa(slots[slot], opa_bg, LV_PART_MAIN);

            lv_obj_set_pos(slots[slot], (int)(x - 14.0f - 120.0f + pill_shift), (int)(y - 20.0f));

            lv_label_set_text(title_lbls[slot], TITLES[di]);
            lv_obj_set_style_opa(title_lbls[slot], opa_text, LV_PART_MAIN);
            lv_img_set_src(icons[slot], IMGS[di]);
            lv_obj_set_style_opa(icons[slot], opa_icon, LV_PART_MAIN);
          }

          {
            int ci = ((sel) % ITEM_N + ITEM_N) % ITEM_N;
            lv_label_set_text(id(slot_center_sub), SUBTITLES[ci]);
            lv_obj_set_style_opa(id(slot_center_sub), 255, LV_PART_MAIN);
          }

          for (int d = 0; d < ITEM_N; d++) {
            if (d == sel) {
              lv_obj_set_style_bg_color(sdots[d], lv_color_hex(0x576BFE), LV_PART_MAIN);
              lv_obj_set_style_opa(sdots[d], 255, LV_PART_MAIN);
              lv_obj_set_size(sdots[d], 10, 10);
            } else {
              lv_obj_set_style_bg_color(sdots[d], lv_color_hex(0x2A3348), LV_PART_MAIN);
              lv_obj_set_style_opa(sdots[d], 180, LV_PART_MAIN);
              lv_obj_set_size(sdots[d], 6, 6);
            }
          }

          // Position arrow at selected dot
          const int dot_offsets[6] = {-35, -21, -7, 7, 21, 35};
          lv_obj_align(id(menu_arrow), LV_ALIGN_RIGHT_MID, -26, dot_offsets[sel]);

# -- LVGL page_menu -----------------------------------------------
lvgl:
  pages:
    - id: page_menu
      bg_color: col_menu_bg
      bg_opa: COVER
      scrollbar_mode: "OFF"
      widgets:

        # -- Clipping circle (mask to 240x240 round display) ----
        - obj:
            align: CENTER
            width: 240
            height: 240
            radius: 120
            clip_corner: true
            bg_color: col_menu_bg
            border_width: 0
            scrollbar_mode: "OFF"
            pad_all: 0
            widgets:

              - obj:
                  id: menu_stack
                  align: TOP_LEFT
                  x: 0
                  y: 0
                  width: 240
                  height: 240
                  bg_opa: TRANSP
                  border_width: 0
                  scrollbar_mode: "OFF"
                  pad_all: 0
                  clickable: false
                  widgets:

                    # ================================================
                    # SLOT: far_up  (offset -2, top-most, opa 25%)
                    # ================================================
                    - obj:
                        id: slot_far_up
                        align: TOP_MID
                        y: 6
                        width: 180
                        height: 40
                        bg_opa: TRANSP
                        border_width: 0
                        scrollbar_mode: "OFF"
                        pad_all: 0
                        clickable: false
                        widgets:
                          - image:
                              id: slot_far_up_img
                              align: LEFT_MID
                              x: 2
                              src: menu_img_timer
                          - label:
                              id: slot_far_up_lbl
                              align: LEFT_MID
                              x: 38
                              text_font: font_menu_item
                              text_color: col_menu_dim
                              text: "Timer"
                              text_opa: 25%

                    # ================================================
                    # SLOT: near_up  (offset -1, opa 50%)
                    # ================================================
                    - obj:
                        id: slot_near_up
                        align: TOP_MID
                        y: 42
                        width: 180
                        height: 40
                        bg_opa: TRANSP
                        border_width: 0
                        scrollbar_mode: "OFF"
                        pad_all: 0
                        clickable: false
                        widgets:
                          - image:
                              id: slot_near_up_img
                              align: LEFT_MID
                              x: 2
                              src: menu_img_fridge
                          - label:
                              id: slot_near_up_lbl
                              align: LEFT_MID
                              x: 38
                              text_font: font_menu_item
                              text_color: col_menu_dim
                              text: "Fridge"
                              text_opa: 50%

                    # ================================================
                    # SLOT: center  (selected, pill bg, opa 100%)
                    # Icon has no extra colored background.
                    # ================================================
                    - obj:
                        id: slot_center
                        align: TOP_MID
                        y: 102
                        width: 168
                        height: 40
                        radius: 20
                        bg_color: col_menu_pill
                        bg_opa: COVER
                        border_width: 0
                        scrollbar_mode: "OFF"
                        pad_all: 0
                        clickable: false
                        widgets:
                          - image:
                              id: slot_center_img
                              align: LEFT_MID
                              x: 6
                              src: menu_img_light
                          - label:
                              id: slot_center_lbl
                              x: 46
                              y: 0
                              text_font: font_menu_item
                              text_color: col_text_pri
                              width: 116
                              long_mode: DOT
                              text: "Scene"
                          - label:
                              id: slot_center_sub
                              x: 46
                              y: 23
                              text_font: font_menu_sub
                              text_color: col_menu_val
                              width: 112
                              long_mode: DOT
                              text: "Model Sleep"

                    # ================================================
                    # SLOT: near_dn  (offset +1, opa 50%)
                    # ================================================
                    - obj:
                        id: slot_near_dn
                        align: TOP_MID
                        y: 162
                        width: 180
                        height: 40
                        bg_opa: TRANSP
                        border_width: 0
                        scrollbar_mode: "OFF"
                        pad_all: 0
                        clickable: false
                        widgets:
                          - image:
                              id: slot_near_dn_img
                              align: LEFT_MID
                              x: 2
                              src: menu_img_ac
                          - label:
                              id: slot_near_dn_lbl
                              align: LEFT_MID
                              x: 38
                              text_font: font_menu_item
                              text_color: col_menu_dim
                              text: "AC"
                              text_opa: 50%

                    # ================================================
                    # SLOT: far_dn  (offset +2, bottom-most, opa 25%)
                    # ================================================
                    - obj:
                        id: slot_far_dn
                        align: TOP_MID
                        y: 198
                        width: 180
                        height: 40
                        bg_opa: TRANSP
                        border_width: 0
                        scrollbar_mode: "OFF"
                        pad_all: 0
                        clickable: false
                        widgets:
                          - image:
