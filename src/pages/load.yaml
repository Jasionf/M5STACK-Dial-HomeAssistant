font:
  - file: "gfonts://DM+Sans"
    id: font_main
    size: 16
    bpp: 4
    glyphs: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .!-"


  - file:
      family: DM+Sans
      weight: 500
      type: gfonts
    id: font_sm
    size: 14
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .:%\xc2\xb0/-"

# ── Colors ────────────────────────────────────────────────────
color:
  - id: col_blue
    hex: "41B3FF"        # active blue — spinner / dots / bar
  - id: col_blue_track
    hex: "0D2340"        # dark blue — inactive track
  - id: col_success
    hex: "34D399"        # emerald — reserved for future use

globals:
  - id: dot_tick
    type: int
    initial_value: '0'



interval:
  - interval: 400ms
    then:
      - if:
          condition:
            lambda: "return !id(ha_connected);"
          then:
            - lambda: |-
                id(dot_tick) = (id(dot_tick) + 1) % 3;
                lv_obj_set_style_bg_color(id(dot_0),
                  id(dot_tick) == 0 ? lv_color_hex(0x41B3FF) : lv_color_hex(0x0D2340), LV_PART_MAIN);
                lv_obj_set_style_bg_color(id(dot_1),
                  id(dot_tick) == 1 ? lv_color_hex(0x41B3FF) : lv_color_hex(0x0D2340), LV_PART_MAIN);
                lv_obj_set_style_bg_color(id(dot_2),
                  id(dot_tick) == 2 ? lv_color_hex(0x41B3FF) : lv_color_hex(0x0D2340), LV_PART_MAIN);

# ── Scripts ───────────────────────────────────────────────────
script:
  - id: update_loading_page
    then:
      - lvgl.label.update:
          id: lbl_status
          text: "Connecting..."
      - lvgl.label.update:
          id: lbl_sub
          text: "Home Assistant"

  - id: check_boot_status
    then:
      - lambda: |-
          if (id(ha_connected)) {
            lv_obj_add_flag(id(obj_spinner),  LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(obj_dots),     LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(obj_bar_wrap), LV_OBJ_FLAG_HIDDEN);
            id(start_sync_animation).execute();
          }

  - id: start_sync_animation
    then:
      - lvgl.label.update:
          id: lbl_sub
          text: "Syncing..."
      # One continuous lv_anim drives the bar 0→100 over 2400 ms entirely
      # inside the LVGL timer context — no ESPHome delay scheduling, no steps.
      - lambda: |-
          static lv_anim_t a;
          lv_anim_init(&a);
          lv_anim_set_var(&a, id(boot_bar));
          lv_anim_set_values(&a, 0, 100);
          lv_anim_set_time(&a, 2400);
          lv_anim_set_path_cb(&a, lv_anim_path_ease_in_out);
          lv_anim_set_exec_cb(&a, [](void * obj, int32_t v) {
              lv_bar_set_value((lv_obj_t *)obj, v, LV_ANIM_OFF);
          });
          lv_anim_start(&a);
      - delay: 2500ms
      - lambda: "lv_obj_fade_out(id(loading_page), 400, 0);"
      - delay: 450ms
      - lvgl.page.show: page_clock
      - lvgl.widget.hide: loading_page

  - id: on_ha_connected
    then:
      - lambda: |-
          if (!id(ha_connected)) {
            id(ha_connected) = true;
            lv_label_set_text(id(lbl_status), "Connected!");
            lv_label_set_text(id(lbl_sub),    "Home Assistant");
            id(check_boot_status).execute();
          }

# ── LVGL top layer ────────────────────────────────────────────
lvgl:
  top_layer:
    widgets:
      - obj:
          id: loading_page
          align: CENTER
          width: 240
          height: 240
          radius: 120
          bg_color: col_bg
          bg_opa: COVER
          border_width: 0
          pad_all: 0
          scrollbar_mode: "OFF"
          clip_corner: true
          widgets:

            # ── Spinner (connecting phase — thin blue ring) ────────
            - obj:
                id: obj_spinner
                align: CENTER
                width: 240
                height: 240
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                scrollbar_mode: "OFF"
                widgets:
                  - spinner:
                      id: boot_spinner
                      align: CENTER
                      width: 216
                      height: 216
                      spin_time: 1400ms
                      arc_length: 90deg
                      arc_width: 3
                      arc_color: col_blue_track
                      indicator:
                        arc_color: col_blue
                        arc_width: 3

            # ── Center logo (ID defined in dial.yaml, 72×72) ───────
            - image:
                src: logo_img
                align: CENTER
                y: -22

            # ── Primary status text ────────────────────────────────
            - label:
                id: lbl_status
                align: CENTER
                y: 30
                text_font: font_main
                text_color: col_text_pri
                text: "Connecting..."
                text_align: CENTER

            # ── Sub-status text ────────────────────────────────────
            - label:
                id: lbl_sub
                align: CENTER
                y: 50
                text_font: font_sm
                text_color: col_text_sec
                text: "Home Assistant"
                text_align: CENTER

            # ── Three-dot animation (connecting phase) ─────────────
            - obj:
                id: obj_dots
                align: CENTER
                y: 72
                width: 40
                height: 10
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                scrollbar_mode: "OFF"
                widgets:
                  - obj:
                      id: dot_0
                      align: LEFT_MID
                      x: 0
                      width: 6
                      height: 6
                      radius: 3
                      bg_color: col_blue
                      border_width: 0
                      clickable: false
                  - obj:
                      id: dot_1
                      align: CENTER
                      width: 6
                      height: 6
                      radius: 3
                      bg_color: col_blue_track
                      border_width: 0
                      clickable: false
                  - obj:
                      id: dot_2
                      align: RIGHT_MID
                      x: 0
                      width: 6
                      height: 6
                      radius: 3
                      bg_color: col_blue_track
                      border_width: 0
                      clickable: false

            # ── Progress bar (sync phase — default hidden) ─────────
            - obj:
                id: obj_bar_wrap
                align: CENTER
                y: 72
                width: 130
                height: 10
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                scrollbar_mode: "OFF"
                hidden: true
                widgets:
                  - bar:
                      id: boot_bar
                      align: CENTER
                      width: 130
                      height: 4
                      value: 0
                      min_value: 0
                      max_value: 100
                      animated: false   # lv_anim handles it; native anim would interfere
                      bg_color: col_blue_track
                      indicator:
                        bg_color: col_blue
