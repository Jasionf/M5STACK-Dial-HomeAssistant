# =================================================================
#  music_simulator.yaml  -  ESPHome Host/SDL Simulator
#
#  Preview the Music Player page on macOS/Linux without
#  real hardware.
#
#  Requirements:
#    brew install sdl2
#    pip install esphome
#
#  Run:
#    esphome run music_simulator.yaml
#
#  Controls (SDL window):
#    Mouse click  → touch input
#    Close window → exit
# =================================================================

esphome:
  name: music-simulator
  on_boot:
    priority: -100
    then:
      - script.execute: open_music

host:

# ── SDL Display (240×240) ──────────────────────────────────────
display:
  - platform: sdl
    id: round_display
    dimensions:
      width: 240
      height: 240

# ── SDL Touchscreen (mouse input) ─────────────────────────────
touchscreen:
  - platform: sdl
    display: round_display
    id: touch

# ── Globals required by the included page ─────────────────────
# Note: in_music and music_volume are declared inside music.yaml
globals:
  - id: in_menu
    type: bool
    initial_value: 'false'

# ── Shared base colors ────────────────────────────────────────
color:
  - id: col_bg
    hex: "000000"
  - id: col_text_sec
    hex: "94A3B8"

# ── Default font (required by LVGL component init) ────────────
font:
  - file: "gfonts://DM+Sans"
    id: font_lbl
    size: 11
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .-_%/"

# ── LVGL base ─────────────────────────────────────────────────
lvgl:
  displays:
    - round_display
  touchscreens:
    - touch
  color_depth: 16
  bg_color: col_bg
  default_font: font_lbl
  pages:
    # Stub clock page — navigation target for close_music
    - id: page_clock
      bg_color: col_bg
      bg_opa: COVER
      widgets:
        - label:
            align: CENTER
            text: "[ Clock ]"
            text_color: col_text_sec

# ── Include the Music Player page ─────────────────────────────
packages:
  music_page: !include src/pages/music.yaml
