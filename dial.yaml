# ═══════════════════════════════════════════════════════════════
#  dial.yaml  ─  M5Stack Dial · Entry Point
#
#  This file owns:
#    · ESPHome / board / connectivity config
#    · Boot sequence (on_boot)
#    · Shared globals, colors, and the logo image asset
#    · LVGL base settings (display binding, encoders, theme)
#
#  All UI pages and hardware drivers are declared in sub-files
#  and merged automatically by the ESPHome package system.
#
#  Package structure:
#    src/hardware.yaml       ← I²C, SPI, display, touch, light…
#    src/pages/load.yaml     ← Boot/loading overlay (top_layer)
#    src/pages/main.yaml     ← Clock page (page_clock)
#    src/pages/menu.yaml     ← Vertical list menu (page_menu)
# ═══════════════════════════════════════════════════════════════

packages:
  hardware:  !include src/main/hardware.yaml
  load_page: !include src/pages/load.yaml
  clock_page: !include src/pages/main.yaml
  menu_page:  !include src/pages/menu.yaml
  light_page: !include src/pages/light.yaml
  air_page:   !include src/pages/air.yaml
  music_page: !include src/pages/music.yaml
  fridge_page: !include src/pages/fridge.yaml
  timer_page:  !include src/pages/timer.yaml

# ── Core ──────────────────────────────────────────────────────
esphome:
  name: m5stack-dialv1
  friendly_name: M5Stack Dial
  on_boot:
    priority: -100
    then:
      - pcf8563.read_time:
      - light.turn_on:
          id: display_backlight
          brightness: 100%
      - script.execute: update_loading_page

esp32:
  board: m5stack-stamps3
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BROWNOUT_DET: "n"

logger:
  level: DEBUG

# ── Connectivity ───────────────────────────────────────────────
api:
  encryption:
    key: "wzh2ZJbqp7qEja5lDf8Hfq7Dabmu60FDSdRPRXfcZvQ="
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - script.execute: on_ha_connected
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - globals.set:
              id: ha_connected
              value: 'false'

ota:
  - platform: esphome
    password: "67bc085bb265aa2670370e149ea9ba0e"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Dial Fallback Hotspot"
    password: "ufoNG0eGiUO7"

# ── Global state ───────────────────────────────────────────────
globals:
  - id: ha_connected
    type: bool
    initial_value: 'false'

# ── Images ────────────────────────────────────────────────────
image:
  - file: src/assets/images/logo.png
    id: logo_img
    type: RGB565
    transparency: alpha_channel
    resize: 72x72
  - file: "src/assets/images/\u573a\u666f.png"
    id: img_scene
    type: RGB565
    transparency: alpha_channel
    resize: 24x24
  - file: "src/assets/images/\u706f\u6ce1.png"
    id: img_light
    type: RGB565
    transparency: alpha_channel
    resize: 24x24
  - file: "src/assets/images/\u7a7a\u8c03.png"
    id: img_ac
    type: RGB565
    transparency: alpha_channel
    resize: 24x24
  - file: "src/assets/images/\u97f3\u4e50.png"
    id: img_music
    type: RGB565
    transparency: alpha_channel
    resize: 24x24
  - file: "src/assets/images/palette.png"
    id: img_palette
    type: RGB565
    transparency: alpha_channel
    resize: 24x24
  - file: "src/assets/images/brightness.png"
    id: img_brightness
    type: RGB565
    transparency: alpha_channel
    resize: 24x24
  - file: "src/assets/images/灯光.png"
    id: img_dengguang
    type: RGB565
    transparency: alpha_channel
    resize: 24x24
# ── Shared color tokens ────────────────────────────────────────
#    Page-specific colors live in their respective page files.
color:
  - id: col_bg
    hex: "060610"    # deep space navy — global background

  - id: col_text_pri
    hex: "E2E8F0"    # slate-100 — primary text (softer than pure white)

  - id: col_text_sec
    hex: "94A3B8"    # slate-400 — secondary / date text

# ── LVGL base ─────────────────────────────────────────────────
#    Displays, encoders, and global theme.
#    top_layer comes from load.yaml; pages come from main.yaml.
lvgl:
  displays:
    - round_display
  touchscreens:
    - touch
  encoders:
    - sensor: encoder
      enter_button: front_button
  color_depth: 16
  # buffer_size: 25%
  bg_color: col_bg
  default_font: font_lbl   # defined in src/pages/main.yaml
